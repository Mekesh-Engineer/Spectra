    <style>
        :root {
            --sys-bg-secondary: #1a1a22;
            --sys-border: #2e2e3a;
            --sys-accent: #ff2d2d;
        }

        @media (prefers-color-scheme: light) {
            :root {
                --sys-bg-secondary: #f4f4f5;
                --sys-border: #d4d4d8;
                --sys-accent: #dc2626;
            }
        }

        .tile {
            fill: var(--sys-bg-secondary);
        }

        .ring {
            fill: none;
            stroke: var(--sys-border);
            stroke-width: 1;
        }

        .mark {
            fill: var(--sys-accent);
        }
    </style>

